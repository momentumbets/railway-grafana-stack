eauth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: 2025-01-01
      index:
        period: 24h
        prefix: index_
      store: tsdb
      object_store: filesystem
      schema: v13

storage_config:
  filesystem:
    directory: /loki/chunks
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

limits_config:
  allow_deletes: true
  volume_enabled: true
  retention_period: 168h # 7 days — auto-purge older logs
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB
  reject_old_samples: true
  reject_old_samples_max_age: 168h

  # TODO: address large logs and then reduce this again
  max_line_size: 3145728

# Compactor handles retention deletion — without retention_enabled: true,
# the retention_period above is silently ignored.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

pattern_ingester:
  enabled: true
